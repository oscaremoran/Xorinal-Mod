# Items
item.xorinal-spore-cluster.name = Spore Cluster
item.xorinal-spore-cluster.description = Bioluminescent fungal clusters harvested from the surface of Xorinal. The primary building material of this world.
item.xorinal-bio-mass.name = Bio-Mass
item.xorinal-bio-mass.description = Dense organic matter extracted from Xorinal's living terrain. A versatile secondary resource.
item.xorinal-mycelium-fiber.name = Mycelium Fiber
item.xorinal-mycelium-fiber.description = Woven strands of processed mycelium. Strong, lightweight, and essential for advanced construction.
item.xorinal-mycelium-plate.name = Mycelium Plate
item.xorinal-mycelium-plate.description = Hardened plates forged from spore clusters under liquid bombardment. Used in advanced structures.

# Liquids
liquid.xorinal-spore-solution.name = Spore Solution
liquid.xorinal-spore-solution.description = A viscous liquid extracted from spore clusters. Used in advanced crafting and as turret ammunition.

# Core
block.xorinal-core-sporocyst.name = Core: Sporocyst
block.xorinal-core-sporocyst.description = The initial landing core on Xorinal. A living structure that sustains your colony with organic technology.

# Production
block.xorinal-spore-extractor.name = Spore Extractor
block.xorinal-spore-extractor.description = Harvests spore clusters from ore deposits beneath the surface.
block.xorinal-bio-press.name = Bio-Press
block.xorinal-bio-press.description = Compresses spore clusters and bio-mass into durable mycelium fiber.
block.xorinal-spore-dissolver.name = Spore Dissolver
block.xorinal-spore-dissolver.description = Dissolves spore clusters into a potent liquid solution.
block.xorinal-bombardment-chamber.name = Bombardment Chamber
block.xorinal-bombardment-chamber.description = Bombards spore clusters with pressurized spore solution to produce hardened mycelium plates.
block.xorinal-spore-combustor.name = Spore Combustor
block.xorinal-spore-combustor.description = Burns organic matter to generate power. Feeds on any solid fuel.
block.xorinal-spore-tower.name = Spore Tower
block.xorinal-spore-tower.description = A bioluminescent power node that links nearby structures into a shared power network.

# Distribution
block.xorinal-mycelium-conveyor.name = Mycelium Conveyor
block.xorinal-mycelium-conveyor.description = An organic conveyor grown from living mycelium networks. Transports items slowly but reliably.
block.xorinal-spore-router.name = Spore Router
block.xorinal-spore-router.description = Distributes incoming items evenly to adjacent blocks.
block.xorinal-mycelium-junction.name = Mycelium Junction
block.xorinal-mycelium-junction.description = Allows two conveyor lines to cross without merging.
block.xorinal-mycelium-bridge.name = Mycelium Bridge
block.xorinal-mycelium-bridge.description = Bridges items across gaps and obstacles.

# Liquid
block.xorinal-spore-conduit.name = Spore Conduit
block.xorinal-spore-conduit.description = Transports liquids through organic tubes.
block.xorinal-spore-liquid-router.name = Spore Liquid Router
block.xorinal-spore-liquid-router.description = Distributes liquids evenly to adjacent conduits.

# Turrets
block.xorinal-spore-launcher.name = Spore Launcher
block.xorinal-spore-launcher.description = Launches volatile spore clusters at enemies, dealing splash damage and applying spore toxin.
block.xorinal-toxin-sprayer.name = Toxin Sprayer
block.xorinal-toxin-sprayer.description = Sprays concentrated spore solution in a stream, drenching enemies in corrosive toxins.

# Walls
block.xorinal-bio-wall.name = Bio-Wall
block.xorinal-bio-wall.description = A dense wall of compressed organic matter. Absorbs damage effectively.
block.xorinal-bio-wall-large.name = Large Bio-Wall
block.xorinal-bio-wall-large.description = A larger, sturdier wall of compressed organic matter.

# Storage
block.xorinal-spore-vault.name = Spore Vault
block.xorinal-spore-vault.description = A large organic storage structure for holding resources.

# Units
unit.xorinal-core-scout.name = Spore Scout
unit.xorinal-core-scout.description = A small flying scout spawned from the Core: Sporocyst. The basic worker and defender of Xorinal.
unit.xorinal-sporeling.name = Sporeling
unit.xorinal-sporeling.description = A small spore-based ground crawler. Fast and expendable.
unit.xorinal-drifter.name = Drifter
unit.xorinal-drifter.description = A floating spore organism that drifts through the air, attacking from above.
unit.xorinal-myceloid.name = Myceloid
unit.xorinal-myceloid.description = A six-legged fungal creature reinforced with mycelium armor. Tough and relentless.
unit.xorinal-speeder.name = Speeder
unit.xorinal-speeder.description = A swift aerial predator evolved from the Drifter. Twin weapons and superior speed make it a deadly skirmisher.
unit.xorinal-infector.name = Infector
unit.xorinal-infector.description = A parasitic horror that drains the life force of nearby friendly units. For every 250 HP consumed, it unleashes devastating purple energy blasts.

# Environment
block.xorinal-ore-spore-cluster.name = Spore Cluster Ore
block.xorinal-ore-bio-mass.name = Bio-Mass Ore
block.xorinal-fungal-floor.name = Fungal Floor
block.xorinal-mycelium-floor.name = Mycelium Floor
block.xorinal-xorinal-moss.name = Xorinal Moss
block.xorinal-dense-spore-wall.name = Dense Spore Wall
block.xorinal-fungal-boulder.name = Fungal Boulder

# Units (factories)
block.xorinal-spore-vat.name = Spore Vat
block.xorinal-spore-vat.description = Grows Sporelings and Drifters from organic matter. Requires power.
block.xorinal-spore-reconstructor.name = Spore Reconstructor
block.xorinal-spore-reconstructor.description = Upgrades Sporelings into Myceloids and Drifters into Speeders.
block.xorinal-growth-chamber.name = Growth Chamber
block.xorinal-growth-chamber.description = A living bio-reactor that reconstructs Myceloids into the parasitic Infector.

# Planet
planet.xorinal-xorinal.name = Xorinal
planet.xorinal-xorinal.description = A living world dominated by fungal ecosystems and bioluminescent spore colonies.

# Sectors
sector.xorinal-crash-site.name = Crash Site
sector.xorinal-crash-site.description = Your ship went down on the fungal surface. Establish a foothold and survive.
sector.xorinal-spore-production-facility.name = Spore Production Facility
sector.xorinal-spore-production-facility.description = An abandoned bio-refinery overrun with hostile spores. Hold out for 15 waves to claim it.
sector.xorinal-mycelium-front.name = Mycelium Front
sector.xorinal-mycelium-front.description = A hostile frontier crawling with entrenched fungal forces. Destroy their core to claim this sector.
