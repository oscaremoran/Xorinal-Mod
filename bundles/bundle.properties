# Items
item.xorinal-spore-cluster.name = Spore Cluster
item.xorinal-spore-cluster.description = Bioluminescent fungal clusters harvested from the surface of Xorinal. The primary building material of this world.
item.xorinal-bio-mass.name = Bio-Mass
item.xorinal-bio-mass.description = Dense organic matter extracted from Xorinal's living terrain. A versatile secondary resource.
item.xorinal-mycelium-fiber.name = Mycelium Fiber
item.xorinal-mycelium-fiber.description = Woven strands of processed mycelium. Strong, lightweight, and essential for advanced construction.
item.xorinal-mycelium-plate.name = Mycelium Plate
item.xorinal-mycelium-plate.description = Hardened plates forged from spore clusters under liquid bombardment. Used in advanced structures.
item.xorinal-ice.name = Ice
item.xorinal-ice.description = Frozen chunks harvested from Tetra's surface. Tetra's most abundant resource.
item.xorinal-cryonite.name = Cryonite
item.xorinal-cryonite.description = A rare crystalline mineral found deep in Tetra's glaciers. Hardens on contact with warm air.
item.xorinal-glacium.name = Glacium
item.xorinal-glacium.description = Compressed cryonite fused into a dense crystalline alloy. The backbone of Tetra's advanced structures.
item.xorinal-spore-crystal.name = Spore Crystal
item.xorinal-spore-crystal.description = A dense crystalline spore cultivated under pressurized spore solution. Unstable but potent.
item.xorinal-bloom-essence.name = Bloom Essence
item.xorinal-bloom-essence.description = A volatile alloy of spore crystal and mycelium plating. The most destructive ammunition Xorinal can produce.

# Liquids
liquid.xorinal-spore-solution.name = Spore Solution
liquid.xorinal-spore-solution.description = A viscous liquid extracted from spore clusters. Used in advanced crafting and as turret ammunition.

# Core
block.xorinal-core-sporocyst.name = Core: Sporocyst
block.xorinal-core-sporocyst.description = The initial landing core on Xorinal. A living structure that sustains your colony with organic technology.
block.xorinal-core-hyphae.name = Core: Hyphae
block.xorinal-core-hyphae.description = A larger, more resilient core grown from interwoven hyphae. Stores more resources and withstands heavier assaults.
block.xorinal-core-heart.name = Core: Mycelium Heart
block.xorinal-core-heart.description = The apex Xorinal core. A pulsating mycelial heart that anchors a mature colony. Massive capacity and formidable durability.
block.xorinal-core-frost.name = Core: Frost
block.xorinal-core-frost.description = The initial landing core on Tetra. A reinforced arctic base designed to withstand the frozen wastes.
block.xorinal-frost-drill.name = Frost Drill
block.xorinal-frost-drill.description = Mines ice and cryonite from Tetra's frozen surface.
block.xorinal-frost-conveyor.name = Frost Conveyor
block.xorinal-frost-conveyor.description = Transports items across Tetra's icy terrain.
block.xorinal-icicle.name = Icicle
block.xorinal-icicle.description = A small turret that fires sharpened ice shards. Uses cryonite for piercing shots.
block.xorinal-frost-flak.name = Frost Flak
block.xorinal-frost-flak.description = An anti-air turret that fires bursting ice flak rounds. Cryonite rounds extend blast radius.
block.xorinal-cryonite-compressor.name = Cryonite Compressor
block.xorinal-cryonite-compressor.description = Compresses cryonite and ice under extreme pressure to form dense glacium alloy. Requires power.
block.xorinal-frost-combustor.name = Frost Combustor
block.xorinal-frost-combustor.description = Sublimates cryonite to generate power. Efficient but consumes rare material.
block.xorinal-frost-node.name = Frost Node
block.xorinal-frost-node.description = A power node cast from ice and cryonite. Links nearby structures into a shared power network.
block.xorinal-frost-wall.name = Frost Wall
block.xorinal-frost-wall.description = A dense wall of compacted ice. Durable against Serpulo-era weapons.
block.xorinal-frost-wall-large.name = Large Frost Wall
block.xorinal-frost-wall-large.description = A larger, sturdier wall of compacted ice.
block.xorinal-frost-vault.name = Frost Vault
block.xorinal-frost-vault.description = A large insulated vault for storing Tetra's resources.
block.xorinal-frost-junction.name = Frost Junction
block.xorinal-frost-junction.description = Allows two conveyor lines to cross without merging.
block.xorinal-frost-bridge.name = Frost Bridge
block.xorinal-frost-bridge.description = Bridges items across gaps and obstacles.
block.xorinal-frost-router.name = Frost Router
block.xorinal-frost-router.description = Distributes incoming items evenly to adjacent blocks across Tetra's icy lines.
block.xorinal-frost-hatchery.name = Frost Hatchery
block.xorinal-frost-hatchery.description = Constructs Rimewings from ice, cryonite, and glacium. Requires power.
block.xorinal-ore-ice.name = Ice Ore
block.xorinal-ore-cryonite.name = Cryonite Ore

# Production
block.xorinal-spore-extractor.name = Spore Extractor
block.xorinal-spore-extractor.description = Harvests spore clusters from ore deposits beneath the surface.
block.xorinal-bio-press.name = Bio-Press
block.xorinal-bio-press.description = Compresses spore clusters and bio-mass into durable mycelium fiber.
block.xorinal-spore-dissolver.name = Spore Dissolver
block.xorinal-spore-dissolver.description = Dissolves spore clusters into a potent liquid solution.
block.xorinal-bombardment-chamber.name = Bombardment Chamber
block.xorinal-bombardment-chamber.description = Bombards spore clusters with pressurized spore solution to produce hardened mycelium plates.
block.xorinal-spore-combustor.name = Spore Combustor
block.xorinal-spore-combustor.description = Burns organic matter to generate power. Feeds on any solid fuel.
block.xorinal-spore-tower.name = Spore Tower
block.xorinal-spore-tower.description = A bioluminescent power node that links nearby structures into a shared power network.

# Distribution
block.xorinal-spore-conveyor.name = Spore Conveyor
block.xorinal-spore-conveyor.description = An organic conveyor grown from living mycelium networks. Transports items slowly but reliably.
block.xorinal-mycelium-conveyor.name = Mycelium Conveyor
block.xorinal-mycelium-conveyor.description = A reinforced conveyor woven from mycelium fiber. Moves items nearly three times faster than a Spore Conveyor.
block.xorinal-spore-router.name = Spore Router
block.xorinal-spore-router.description = Distributes incoming items evenly to adjacent blocks.
block.xorinal-spore-junction.name = Spore Junction
block.xorinal-spore-junction.description = Allows two conveyor lines to cross without merging.
block.xorinal-spore-bridge.name = Spore Bridge
block.xorinal-spore-bridge.description = Bridges items across gaps and obstacles.

# Liquid
block.xorinal-spore-conduit.name = Spore Conduit
block.xorinal-spore-conduit.description = Transports liquids through organic tubes.
block.xorinal-spore-liquid-router.name = Spore Liquid Router
block.xorinal-spore-liquid-router.description = Distributes liquids evenly to adjacent conduits.

# Turrets
block.xorinal-spore-launcher.name = Spore Launcher
block.xorinal-spore-launcher.description = Launches volatile spore clusters at enemies, dealing splash damage and applying spore toxin.
block.xorinal-toxin-sprayer.name = Toxin Sprayer
block.xorinal-toxin-sprayer.description = Sprays concentrated spore solution in a stream, drenching enemies in corrosive toxins.
block.xorinal-spore-rift.name = Spore Rift
block.xorinal-spore-rift.description = Launches collapsing spore singularities that slowly drag enemies in. Units caught in the rift have their health rapidly drained. Fires mycelium fiber or mycelium plates.
block.xorinal-spore-lance.name = Spore Lance
block.xorinal-spore-lance.description = A long-range precision cannon that fires piercing mycelium rounds. Extreme range makes it ideal for picking off high-priority targets from safety. Fed with Bloom Essence, its shots become devastating and inflict Bleeding.
block.xorinal-bloom-spire.name = Bloom Spire
block.xorinal-bloom-spire.description = The apex of Xorinal weapons engineering. A towering crystalline cannon with extreme range. Devastates any unit that enters its sight, applying Bleeding to drain survivors to near-death in seconds.
block.xorinal-crystal-synthesizer.name = Crystal Synthesizer
block.xorinal-crystal-synthesizer.description = Cultivates spore crystals under pressurized spore solution. Requires power, spore cluster, bio-mass, and spore solution.
block.xorinal-bloom-forge.name = Bloom Forge
block.xorinal-bloom-forge.description = Fuses spore crystals with mycelium plates into volatile bloom essence. Requires significant power.
block.xorinal-bloom-chamber.name = Bloom Chamber
block.xorinal-bloom-chamber.description = An apex bio-construct that assembles the largest Xorinal units — Mycelith and Overmind — at tremendous cost.
status.xorinal-bleeding.name = Bleeding
status.xorinal-bleeding.description = Hemorrhaging from ruptured internals. Rapid health loss and reduced combat performance.

# Walls
block.xorinal-bio-wall.name = Bio-Wall
block.xorinal-bio-wall.description = A dense wall of compressed organic matter. Absorbs damage effectively.
block.xorinal-bio-wall-large.name = Large Bio-Wall
block.xorinal-bio-wall-large.description = A larger, sturdier wall of compressed organic matter.
block.xorinal-mycelium-wall.name = Mycelium Wall
block.xorinal-mycelium-wall.description = A living wall of woven mycelium fibers. Tougher than bio-walls.
block.xorinal-mycelium-wall-large.name = Large Mycelium Wall
block.xorinal-mycelium-wall-large.description = A larger fortification of densely-woven mycelium fibers.
block.xorinal-bloom-wall.name = Bloom Wall
block.xorinal-bloom-wall.description = A wall fused with bloom essence. Extremely durable and faintly luminescent.
block.xorinal-bloom-wall-large.name = Large Bloom Wall
block.xorinal-bloom-wall-large.description = A massive fortification charged with bloom essence. The strongest wall on Xorinal.

# Storage
block.xorinal-spore-vault.name = Spore Vault
block.xorinal-spore-vault.description = A large organic storage structure for holding resources.
block.xorinal-mycelium-unloader.name = Mycelium Unloader
block.xorinal-mycelium-unloader.description = A living unloader that draws resources out of adjacent containers and onto conveyors.

# Units
unit.xorinal-core-scout.name = Spore Scout
unit.xorinal-core-scout.description = A small flying scout spawned from the Core: Sporocyst. The basic worker and defender of Xorinal.
unit.xorinal-sporeling.name = Sporeling
unit.xorinal-sporeling.description = A small spore-based ground crawler. Fast and expendable.
unit.xorinal-drifter.name = Drifter
unit.xorinal-drifter.description = A floating spore organism that drifts across the earth, attacking swiftly A good recon unit.
unit.xorinal-myceloid.name = Myceloid
unit.xorinal-myceloid.description = A six-legged fungal creature reinforced with mycelium armor. Tough and relentless.
unit.xorinal-speeder.name = Speeder
unit.xorinal-speeder.description = A swift predator evolved from the Drifter. Twin weapons and superior speed make it a deadly skirmisher.
unit.xorinal-infector.name = Infector
unit.xorinal-infector.description = A parasitic unit that drains the life force of nearby friendly units. For every 250 HP consumed, it unleashes devastating purple energy blasts.
unit.xorinal-blaster.name = Blaster
unit.xorinal-blaster.description = An evolved Speeder armored in mycelium plating. Rapid-firing twin cannons deliver piercing spore rounds at devastating speed.
unit.xorinal-mycelith.name = Mycelith
unit.xorinal-mycelith.description = A colossal walking monolith of fused mycelium and crystal. Its cannons fire piercing bloom-crystal shells that inflict Bleeding on impact.
unit.xorinal-overmind.name = Overmind
unit.xorinal-overmind.description = The apex airborne bio-command of Xorinal. Saturates the battlefield with explosive green bio-blasts while an always-on central beam carves through any target that drifts too close.
unit.xorinal-frost-scouter.name = Frost Scouter
unit.xorinal-frost-scouter.description = A small flying scout spawned from Core: Frost. The basic worker and defender of Tetra.
unit.xorinal-rimewing.name = Rimewing
unit.xorinal-rimewing.description = A flying attack unit armored with glacium plating. Twin frost cannons fire bursting ice rounds.
unit.xorinal-cryolith.name = Cryolith
unit.xorinal-cryolith.description = An armored ice mech that stomps across Tetra's wastes. Lobs splash-damage frost shells from a turreted cannon.
unit.xorinal-cryobreaker.name = Cryobreaker
unit.xorinal-cryobreaker.description = A heavy T2 frost mech with twin piercing cannons. Upgraded from Cryolith at the Frost Shielder.
unit.xorinal-glacierwing.name = Glacierwing
unit.xorinal-glacierwing.description = A heavy T2 frost flyer with twin piercing splash cannons. Upgraded from Rimewing at the Frost Shielder.

block.xorinal-frost-shielder.name = Frost Shielder
block.xorinal-frost-shielder.description = Reinforces and upgrades T1 frost mechs into heavier T2 chassis. Required to field Cryobreakers.
unit.xorinal-sear.name = Sear
unit.xorinal-sear.description = A small flying incendiary drone. Sprays flame bullets that burn enemies and clear mycelium lichen.

# Environment
block.xorinal-ore-spore-cluster.name = Spore Cluster Ore
block.xorinal-ore-bio-mass.name = Bio-Mass Ore
block.xorinal-fungal-floor.name = Fungal Floor
block.xorinal-mycelium-floor.name = Mycelium Floor
block.xorinal-xorinal-moss.name = Xorinal Moss
block.xorinal-dense-spore-wall.name = Dense Spore Wall
block.xorinal-fungal-boulder.name = Fungal Boulder

# Units (factories)
block.xorinal-spore-vat.name = Spore Vat
block.xorinal-spore-vat.description = Grows Sporelings and Drifters from organic matter. Requires power.
block.xorinal-spore-reconstructor.name = Spore Reconstructor
block.xorinal-spore-reconstructor.description = Upgrades Sporelings into Myceloids and Drifters into Speeders.
block.xorinal-growth-chamber.name = Growth Chamber
block.xorinal-growth-chamber.description = A living bio-reactor that reconstructs Myceloids into the parasitic Infector.

# Planet
planet.xorinal-xorinal.name = Xorinal
planet.xorinal-xorinal.description = A living world dominated by fungal ecosystems and bioluminescent spore colonies.
planet.xorinal-tetra.name = Tetra
planet.xorinal-tetra.description = An icy moon of Serpulo. Frozen wastes rich in minerals. Uses Serpulo-era technology.

# Sectors
sector.xorinal-crash-site.name = Crash Site
sector.xorinal-crash-site.description = A jungle where your ship went down. Establish a base and protect it from spore creatures.
sector.xorinal-spore-production-facility.name = Spore Production Facility
sector.xorinal-spore-production-facility.description = An ancient facility that was overrun with spores. Stronger units attack here. 
sector.xorinal-mycelium-front.name = Contaminated Complex
sector.xorinal-mycelium-front.description = A difficult sector with a small Crux outpost. Enemies will come extremely fast after launch. Quickly gather resources or you will be easily destroyed.
sector.xorinal-biohazard-facility.name = Biohazard Facility
sector.xorinal-biohazard-facility.description = A strong enemy base. Prepare before launching. Heavily defended with Crux Myceloids swarming you soon after launch.
sector.xorinal-crux-spaceport-defense.name = Crux Spaceport Outskirts
sector.xorinal-crux-spaceport-defense.description = The outer fringe of an entrenched Crux spaceport. Push through the perimeter defenses to take the sector.
sector.xorinal-crux-spaceport.name = Crux Spaceport
sector.xorinal-crux-spaceport.description = The heart of the Crux spaceport. Heavily fortified launchpads, command bunkers, and elite garrisons stand between you and full control of the facility.
sector.xorinal-frozen-cavern-tetra.name = Frozen Cavern
sector.xorinal-frozen-cavern-tetra.description = Your landing site on Tetra. A sheltered ice cavern with abundant cryonite. Establish a foothold before the cold and the Crux find you.
