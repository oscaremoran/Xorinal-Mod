name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build mod zip
        run: |
          zip -r Xorinal-Mod.zip . \
            -x "*.git*" \
            -x "*.github*" \
            -x "Xorinal-Mod.zip" \
            -x "README.md" \
            -x "*.DS_Store"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Xorinal-Mod.zip
          generate_release_notes: true
